version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: settings_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - settings-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d settings_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  springboot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: springboot
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - settings-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:8001/v3/api-docs || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6

  node-service:
    build:
      context: ./node-service
      dockerfile: Dockerfile
    container_name: node-service
    ports:
      - "5001:5001"
    env_file:
      - ./node-service/.env
    networks:
      - settings-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:5001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8000:8000"
    env_file:
      - ./gateway/.env
    depends_on:
      springboot:
        condition: service_healthy
      node-service:
        condition: service_healthy
    networks:
      - settings-network

  frontend:
    build:
      context: ./settings-management-ui
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - settings-network

networks:
  settings-network:
    driver: bridge

volumes:
  postgres_data:
